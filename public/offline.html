<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Wingo Signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #F5F5F7;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
    }
    .wrapper {
      max-width: 448px; /* max-w-md */
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .animate-in {
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .gradient-text-container {
      position: relative;
      margin-bottom: 32px;
    }
    .gradient-text {
      font-size: clamp(64px, 15vw, 110px);
      font-weight: 900;
      background: linear-gradient(135deg, #007AFF 0%, #AF52DE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      letter-spacing: -0.05em;
      animation: pulseScale 2s infinite ease-in-out alternate;
      display: inline-block;
    }
    @keyframes pulseScale {
      0% {
        transform: scale(0.95);
      }
      100% {
        transform: scale(1.05);
      }
    }
    .content {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    h1 {
      font-size: 30px; /* text-3xl */
      font-weight: 900; /* font-black */
      color: #0f172a; /* text-slate-900 */
      margin: 0 0 12px 0;
      padding: 0;
      letter-spacing: -0.025em;
    }
    p {
      font-size: 16px; /* text-base */
      color: #64748b; /* text-slate-500 */
      font-weight: 700;
      line-height: 1.625;
      max-width: 320px;
      margin: 0 auto 40px auto;
    }
    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 280px;
      width: 100%;
      margin: 0 auto;
    }
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 18px 24px;
      background-color: #007AFF;
      color: white;
      border-radius: 1.25rem;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      border: none;
      box-shadow: 0 10px 25px rgba(0, 122, 255, 0.25);
      transition: all 0.2s ease-in-out;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:hover {
      background-color: #0066D6;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 18px 24px;
      background-color: white;
      color: #475569;
      border-radius: 1.25rem;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      border: 1px solid #E2E8F0;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease-in-out;
      cursor: pointer;
      width: 100%;
    }
    .btn-secondary:hover {
      background-color: #f8fafc;
    }
    .btn-secondary:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="wrapper animate-in">
    <div class="gradient-text-container">
      <div class="gradient-text">OFFLINE</div>
    </div>
    <div class="content">
      <h1>You are Offline</h1>
      <p>Please check your internet connection and try reloading the page to access Wingo Signal.</p>
      
      <div class="btn-container">
        <button onclick="window.location.reload();" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
          </svg>
          Retry Connection
        </button>
        <button onclick="history.back();" class="btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
          Go Back
        </button>
      </div>
    </div>
  </div>
</body>
</html>
