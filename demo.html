<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Autopay Gateway Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.15);
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: var(--primary);
            filter: blur(180px);
            opacity: 0.18;
            z-index: 0;
        }
        body::before { top: -100px; left: -100px; }
        body::after { bottom: -100px; right: -100px; }

        .client-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            padding: 36px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .amount-input {
            width: 100%;
            padding: 16px 16px 16px 40px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.02);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }

        .amount-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-action:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        /* Payment display (hidden initially) */
        .payment-display {
            display: none;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .qr-frame {
            background: #fff;
            padding: 16px;
            border-radius: 24px;
            display: inline-block;
            margin: 20px 0;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.35);
        }

        .qr-frame img {
            display: block;
            width: 220px;
            height: 220px;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px 0;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 14px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Success screen */
        .success-view {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--success-glow);
            border: 2px solid var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--success);
            font-size: 40px;
            font-weight: bold;
        }

        .success-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--success);
            margin-bottom: 8px;
        }

        .btn-back {
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            box-shadow: none;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="client-card">
        <!-- Input Form Screen -->
        <div id="setupScreen">
            <div class="logo">UPI AUTOPAY</div>
            <div class="subtitle">Enter amount to generate a payment QR code</div>
            
            <div class="form-group">
                <label class="form-label">Payment Amount</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">&#8377;</span>
                    <input type="number" id="amountInput" class="amount-input" placeholder="0.00" min="1" step="any" required>
                </div>
            </div>
            
            <button class="btn-action" onclick="generateQR()">GENERATE QR CODE</button>
        </div>

        <!-- QR Display Screen -->
        <div id="paymentScreen" class="payment-display">
            <div class="logo">SCAN & PAY</div>
            <p class="subtitle" id="paymentMeta"></p>

            <div class="qr-frame">
                <img id="qrImage" src="" alt="UPI QR Code">
            </div>

            <a id="upiPayLink" href="#" class="btn-action" style="display:block;text-decoration:none;margin-bottom:12px;" target="_blank">PAY NOW</a>

            <div class="status-container">
                <div class="spinner" id="statusSpinner"></div>
                <span class="status-text" id="statusText">Waiting for payment...</span>
            </div>
            
            <button class="btn-action btn-back" onclick="resetClient()">CANCEL</button>
        </div>

        <!-- Success Screen -->
        <div id="successScreen" class="success-view">
            <div class="success-icon">&#10003;</div>
            <h3 class="success-title">Payment Verified!</h3>
            <p class="subtitle" style="margin-bottom: 0;">The transaction was detected and verified successfully.</p>
            
            <button class="btn-action btn-back" onclick="resetClient()">CREATE NEW PAYMENT</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://kaelis.sh";
        let pollInterval = null;
        let currentUpiId = null;
        let currentAmount = 0;
        let currentOrderId = null;

        async function generateQR() {
            const amountInput = document.getElementById("amountInput");
            const amount = parseFloat(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid amount greater than 0.");
                return;
            }

            currentAmount = amount;

            // Hide Setup Screen, Show Payment Screen
            document.getElementById("setupScreen").style.display = "none";
            document.getElementById("paymentScreen").style.display = "block";
            
            document.getElementById("paymentMeta").innerText = "Order for Rs. " + amount.toFixed(2);
            document.getElementById("statusText").innerText = "Generating QR Code...";
            document.getElementById("statusSpinner").style.display = "block";

            try {
                const response = await fetch(API_BASE + "/autopay", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ amount: amount })
                });

                if (!response.ok) {
                    throw new Error("Failed to register order");
                }

                const order = await response.json();
                currentOrderId = order.order_id;
                currentUpiId = order.upi_id || "";

                // Load direct raw QR image URL
                document.getElementById("qrImage").src = order.qr_code_url;

                // Generate UPI deep link
                var upiLink = "upi://pay?pa=" + encodeURIComponent(currentUpiId) + 
                    "&pn=" + encodeURIComponent("Wingo Signals") + 
                    "&am=" + amount.toFixed(2) + 
                    "&cu=INR" + 
                    "&tn=" + encodeURIComponent("Wingo Signals - Order " + currentOrderId);
                
                document.getElementById("upiPayLink").href = upiLink;

                document.getElementById("statusText").innerText = "Waiting for payment...";

                // Start polling status
                startPolling(order.order_id);
            } catch (err) {
                alert("Error connecting to server. Please try again.");
                resetClient();
            }
        }

        function startPolling(orderId) {
            if (pollInterval) clearInterval(pollInterval);

            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(API_BASE + "/autopay/verify", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ order_id: orderId })
                    });

                    if (response.ok) {
                        // Success!
                        clearInterval(pollInterval);
                        document.getElementById("paymentScreen").style.display = "none";
                        document.getElementById("successScreen").style.display = "flex";
                    }
                } catch (err) {
                    console.log("Error checking status, retrying...");
                }
            }, 3000);
        }

        function resetClient() {
            if (pollInterval) clearInterval(pollInterval);
            currentUpiId = null;
            currentAmount = 0;
            currentOrderId = null;
            document.getElementById("amountInput").value = "";
            document.getElementById("qrImage").src = "";
            document.getElementById("upiPayLink").href = "#";
            
            document.getElementById("paymentScreen").style.display = "none";
            document.getElementById("successScreen").style.display = "none";
            document.getElementById("setupScreen").style.display = "block";
        }
    </script>
</body>
</html>
