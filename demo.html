<body>

        <header>

        <!-- Input Field -->

    <!-- Custom Toast Message -->
    <div class="toast" id="toast">
        <h2 class="shine-text" style="font-size: 24px; font-weight: bold; margin: 0; text-align: center;">
            CONGRATULATIONS!
        </h2>
        <div style="font-size: 51px; margin: 10px 0;">🎁</div>
        <p id="toast-message" class="shine-text"
            style="font-family: 'Rajdhani'; font-size: 18px; margin-top: 5px; margin-bottom: 15px; padding: 0 15px; width: 100%; line-height: 1.3; overflow-wrap: break-word; word-wrap: break-word; text-align: center;">
            <!-- Message loaded via JS -->
            Processing...
        </p>
        <button class="toast-btn" onclick="closeToast()">OKEY</button>
    </div>

    <script>
        let appSettings = {};

        const btn = document.getElementById('claimBtn');
        const input = document.getElementById('uidInput');
        const realUidInput = document.getElementById('realUid');
        const toast = document.getElementById('toast');
        const rewardsContainer = document.getElementById('rewards-container');
        const toastMsg = document.getElementById('toast-message');

        // Fetch Data on Load
        document.addEventListener('DOMContentLoaded', () => {
            fetch('api.php')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        appSettings = data.settings;
                        toastMsg.innerText = appSettings.popup_message;
                        renderRewards(data.rewards);
                    }
                })
                .catch(err => {
                    console.error('Error fetching data:', err);
                    rewardsContainer.innerHTML = '<p style="text-align:center; color:red;">Connection Failed.</p>';
                });
        });

        function renderRewards(rewards) {
            rewardsContainer.innerHTML = '';

            // Filter out null/invalid rewards
            const validRewards = rewards.filter(r => r !== null && typeof r === 'object');

            if (validRewards.length === 0) {
                rewardsContainer.innerHTML = '<p style="text-align:center; color:#999;">No rewards available.</p>';
                return;
            }

            let currentRow;
            validRewards.forEach((reward, index) => {
                // Start a new row every 3 items
                if (index % 3 === 0) {
                    currentRow = document.createElement('div');
                    currentRow.className = 'row';
                    rewardsContainer.appendChild(currentRow);
                }

                const cardHtml = `
                    <div class="card" onclick="toggleSelection(this)" style="animation-delay: ${0.5 + (index * 0.1)}s">
                        <div class="card-img-wrapper">
                            <img src="${reward.image_url}" alt="Reward">
                        </div>
                        <button class="mini-claim-btn" onclick="claimSingle(event)">Claim</button>
                    </div>
                `;
                currentRow.innerHTML += cardHtml;
            });

            // Add filler items if last row has < 3 items to keep alignment
            if (currentRow && currentRow.children.length < 3) {
                const missing = 3 - currentRow.children.length;
                for (let i = 0; i < missing; i++) {
                    const spacer = document.createElement('div');
                    spacer.className = 'card';
                    spacer.style.opacity = '0';
                    spacer.style.pointerEvents = 'none';
                    currentRow.appendChild(spacer);
                }
            }
        }

        // Enforce Numeric Input and Length
        input.addEventListener('input', (e) => {
            if (!isNaN(e.target.value.replace(/\s/g, ''))) {
                e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 13);
            }
        });

        // Also check on Enter key
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') input.blur();
        });

        function validateUID() {
            if (realUidInput.value) return true;
            const val = input.value.trim();
            if (val.length < 5 || val.length > 13 || !/^\d+$/.test(val)) {
                input.style.borderColor = "red";
                input.style.boxShadow = "0 0 10px red";
                setTimeout(() => {
                    input.style.borderColor = "#444";
                    input.style.boxShadow = "inset 0 0 10px #000";
                }, 500);
                input.focus();
                return false;
            }
            return true;
        }

        function showSuccess() {
            toast.classList.add('show');
            if (window.confetti) {
                const duration = 2000;
                const end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ffcc00', '#ff0000', '#ffffff'] });
                    confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffcc00', '#ff0000', '#ffffff'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }
        }

        function closeToast() {
            toast.classList.remove('show');
            input.value = "";
            realUidInput.value = "";
            input.style.color = "#fff";
            document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
        }

        function claimSingle(event) {
            event.stopPropagation();
            if (appSettings.claim_mode === 'redirect') {
                if (appSettings.redirect_url && appSettings.redirect_url.trim() !== '') {
                    window.location.href = appSettings.redirect_url;
                } else {
                    alert('Redirect URL not set by admin.');
                }
                return;
            }
            if (!validateUID()) {
                alert("Please enter a valid UID (8-13 digits)!");
                return;
            }
            showSuccess();
        }

        function toggleSelection(card) {
            card.classList.toggle('selected');
        }

        // Bulk Claim Logic
        btn.addEventListener('click', () => {
            if (appSettings.claim_mode === 'redirect') {
                if (appSettings.redirect_url && appSettings.redirect_url.trim() !== '') {
                    window.location.href = appSettings.redirect_url;
                } else {
                    alert('Redirect URL not set by admin.');
                }
                return;
            }
            if (!validateUID()) {
                alert("Please enter a valid UID (8-13 digits)!");
                return;
            }
            const selectedCards = document.querySelectorAll('.card.selected');
            if (selectedCards.length === 0) {
                alert("Please select at least one reward to claim!");
                return;
            }
            showSuccess();
        });

        // Tilt Effect
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('.card')) {
                const card = e.target.closest('.card');
                card.addEventListener('mousemove', (ev) => {
                    const rect = card.getBoundingClientRect();
                    const x = ev.clientX - rect.left;
                    const y = ev.clientY - rect.top;
                    card.style.boxShadow = `${-x / 5 + 20}px ${-y / 5 + 20}px 30px rgba(255, 204, 0, 0.4)`;
                });
                card.addEventListener('mouseleave', () => {
                    if (!card.classList.contains('selected')) {
                        card.style.boxShadow = 'none';
                    } else {
                        card.style.boxShadow = '0 0 15px rgba(255, 204, 0, 0.6)';
                    }
                });
            }
        });
    </script>
